name: KiCad Site Build & Deploy

on:
  workflow_call:
    inputs:
      project_name:
        description: "Project name (e.g. pedalboard-hw)"
        required: true
        type: string
      schematic:
        description: "KiCad schematic filename"
        required: true
        type: string
      pcb:
        description: "KiCad PCB filename (optional)"
        type: string
        default: ""
      kicad_dir:
        description: "Directory containing KiCad project files"
        type: string
        default: "."
      kibot_config:
        description: "KiBot config filename (relative to kicad_dir)"
        type: string
        default: ""
      container_image:
        description: "KiCad container image"
        type: string
        default: "ghcr.io/inti-cmnb/kicad9_auto_full:latest"
      kibot_install:
        description: "Custom KiBot install command (e.g. pip install from dev branch). Leave empty if container already has KiBot."
        type: string
        default: ""
      site_dir:
        description: "Directory containing Hugo site"
        type: string
        default: "site"
      site_base_url:
        description: "Base URL of the GitHub Pages site (e.g. https://pedalboard.github.io/pedalboard-hw)"
        required: true
        type: string
      hugo_version:
        description: "Hugo version"
        type: string
        default: "0.160.1"
      remove_step_file:
        description: "Remove large STEP file from output"
        type: boolean
        default: true
      assembly_dir:
        description: "Directory containing assembly 3D model files (STEP/GLB). Leave empty to skip."
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.container_image }}
      options: --user root
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: "0"

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq python3-pip python3-lxml git rsync wget jq > /dev/null 2>&1
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          KIBOT_INSTALL="${{ inputs.kibot_install }}"
          if [ -n "$KIBOT_INSTALL" ]; then
            eval "$KIBOT_INSTALL"
          fi

      - name: Run KiBot
        working-directory: ${{ inputs.kicad_dir }}
        run: |
          ARGS="-e ${{ inputs.schematic }} -d generated"
          [ -n "${{ inputs.pcb }}" ] && ARGS="-b ${{ inputs.pcb }} $ARGS"
          [ -n "${{ inputs.kibot_config }}" ] && ARGS="-c ${{ inputs.kibot_config }} $ARGS"
          kibot $ARGS

      - name: Remove STEP file
        if: inputs.remove_step_file
        run: rm -f "${{ inputs.kicad_dir }}/generated/3D/${{ inputs.project_name }}-3D.step"

      - name: Determine version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: KiBot diffs
        working-directory: ${{ inputs.kicad_dir }}
        continue-on-error: true
        run: |
          ARGS="-e ${{ inputs.schematic }} -d generated -s run_erc,run_drc diff_sch diff_pcb"
          [ -n "${{ inputs.pcb }}" ] && ARGS="-b ${{ inputs.pcb }} $ARGS"
          [ -n "${{ inputs.kibot_config }}" ] && ARGS="-c ${{ inputs.kibot_config }} $ARGS"
          kibot $ARGS

      - name: Install Hugo and Go
        run: |
          wget -q "https://go.dev/dl/go1.26.2.linux-amd64.tar.gz" -O /tmp/go.tar.gz
          tar -xzf /tmp/go.tar.gz -C /usr/local
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${{ inputs.hugo_version }}/hugo_extended_${{ inputs.hugo_version }}_linux-amd64.tar.gz" -O /tmp/hugo.tar.gz
          tar -xzf /tmp/hugo.tar.gz -C /usr/local/bin hugo

      - name: Discover assets
        id: assets
        run: |
          GEN="${{ inputs.kicad_dir }}/generated"

          # Renders (prefer Blender renders if available)
          RENDERS="[]"
          if [ -d "$GEN/3D" ]; then
            BLENDER=$(find "$GEN/3D" -maxdepth 1 -name '*blender*.png' -printf '%f\n' | sort)
            if [ -n "$BLENDER" ]; then
              RENDERS=$(echo "$BLENDER" | jq -R . | jq -s .)
            else
              RENDERS=$(find "$GEN/3D" -maxdepth 1 -name '*.png' -printf '%f\n' | sort | jq -R . | jq -s .)
            fi
          fi
          echo "renders=$(echo $RENDERS | jq -c .)" >> "$GITHUB_OUTPUT"

          # Downloads — search by name pattern to support any KiBot directory layout
          DL="[]"
          add() {
            local m=$(find "$GEN" -name "$2" -type f $3 2>/dev/null | head -1)
            [ -n "$m" ] && DL=$(echo "$DL" | jq --arg n "$1" --arg p "${m#$GEN/}" '. + [{"name":$n,"path":$p}]')
          }
          add "Schematic (PDF)" "*schematic*.pdf"
          add "BOM (HTML)" "*bom*.html" "! -name *ibom*"
          add "BOM (CSV)" "*bom*.csv" "! -name *ibom*"
          add "Interactive BOM" "*ibom*.html"
          add "JLCPCB" "*JLCPCB*.zip"
          add "PCBWay" "*PCBWay*.zip"
          echo "downloads=$(echo $DL | jq -c .)" >> "$GITHUB_OUTPUT"

          # Diffs
          DIFFS="[]"
          for f in $(find "$GEN/Diff" \( -name '*.html' -o -name '*.pdf' \) -type f 2>/dev/null | grep -v '(' | sort); do
            NAME=$(basename "$f" .html | sed 's/-/ /g; s/\b\(.\)/\u\1/g')
            DIFFS=$(echo "$DIFFS" | jq --arg n "$NAME" --arg p "${f#$GEN/}" '. + [{"name":$n,"path":$p}]')
          done
          echo "diffs=$(echo $DIFFS | jq -c .)" >> "$GITHUB_OUTPUT"

          # Interactive BOM
          IBOM=$(find "$GEN" -name '*ibom*.html' -type f 2>/dev/null | head -1)
          [ -n "$IBOM" ] && echo "ibom=${IBOM#$GEN/}" >> "$GITHUB_OUTPUT" || echo "ibom=" >> "$GITHUB_OUTPUT"

      - name: Build Hugo site
        env:
          PATH: "/usr/local/go/bin:/usr/local/bin:/usr/bin:/bin"
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="$TAG"
          [ "$TAG" = "latest" ] && VERSION="main"
          SITE="${{ inputs.site_dir }}"
          BASE="${{ inputs.site_base_url }}/${TAG}/"

          # Copy KiBot outputs into Hugo static dir
          rsync -a "${{ inputs.kicad_dir }}/generated/" "${SITE}/static/"
          rm -f "${SITE}/static/index.html"

          # Copy KiCad files for KiCanvas
          mkdir -p "${SITE}/static/kicad"
          cp ${{ inputs.kicad_dir }}/*.kicad_sch ${{ inputs.kicad_dir }}/*.kicad_pcb "${SITE}/static/kicad/" 2>/dev/null || true
          # Order: root schematic first, then remaining schematics, then PCB
          KICAD_FILES=$(cd "${SITE}/static/kicad" && {
            [ -f "${{ inputs.schematic }}" ] && echo "${{ inputs.schematic }}"
            ls *.kicad_sch 2>/dev/null | grep -v "^${{ inputs.schematic }}$"
            ls *.kicad_pcb 2>/dev/null
          } | jq -R . | jq -s -c .)

          # Copy assembly models (STEP/GLB/3MF)
          ASSEMBLY_MODELS="[]"
          if [ -n "${{ inputs.assembly_dir }}" ] && [ -d "${{ inputs.assembly_dir }}" ]; then
            mkdir -p "${SITE}/static/assembly"
            find "${{ inputs.assembly_dir }}" -maxdepth 1 \( -name 'assembly-*.step' -o -name 'assembly-*.glb' -o -name 'assembly-*.3mf' -o -name 'assembly-*.png' \) -exec cp {} "${SITE}/static/assembly/" \;
            # Only auto-discover names if assemblyModels is not already defined in hugo.yaml
            if ! grep -q 'assemblyModels:' "${SITE}/hugo.yaml" 2>/dev/null; then
              ASSEMBLY_MODELS=$(cd "${SITE}/static/assembly" && ls *.step *.glb *.3mf 2>/dev/null | jq -R '{name: (. | sub("assembly-";"") | sub("\\.(step|glb|3mf)$";"") | gsub("[-_]";" ")), file: .}' | jq -s -c .)
            fi
          fi

          # Clear downloads/diffs for latest (non-release) builds
          if [ "$TAG" = "latest" ]; then
            DOWNLOADS='[]'
          else
            DOWNLOADS='${{ steps.assets.outputs.downloads }}'
          fi
          DIFFS='${{ steps.assets.outputs.diffs }}'

          # Build config override with dynamic params
          OVERRIDE="baseURL: ${BASE}\nparams:\n  version: \"${VERSION}\"\n  kicadFiles: ${KICAD_FILES}\n  renders: ${{ steps.assets.outputs.renders }}\n  downloads: ${DOWNLOADS}\n  diffs: ${DIFFS}"
          [ -n "${{ steps.assets.outputs.ibom }}" ] && OVERRIDE="${OVERRIDE}\n  ibom: \"${{ steps.assets.outputs.ibom }}\""
          [ "$ASSEMBLY_MODELS" != "[]" ] && OVERRIDE="${OVERRIDE}\n  assemblyModels: ${ASSEMBLY_MODELS}"
          printf "$OVERRIDE\n" > "${SITE}/config_override.yaml"

          cd "$SITE"
          hugo mod get
          hugo --minify --config hugo.yaml,config_override.yaml

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: site-${{ steps.ver.outputs.tag }}
          path: ${{ inputs.site_dir }}/public

      # --- Deploy ---

      - name: Update versions.json
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch origin gh-pages:gh-pages 2>/dev/null || true

          # Get existing versions.json from gh-pages
          EXISTING="[]"
          git show gh-pages:versions.json > /tmp/old-versions.json 2>/dev/null && \
            EXISTING=$(jq 'map(select(.tag != "'"$TAG"'"))' /tmp/old-versions.json)

          # Build new entry
          NEW=$(jq -n --arg tag "$TAG" '{tag:$tag}')

          # Prepend, mark first as latest
          echo "$EXISTING" | jq --argjson new "$NEW" \
            '[$new] + [.[] | del(.latest)] | .[0].latest = true' > /tmp/versions.json

          mkdir -p deploy-root
          cp /tmp/versions.json deploy-root/versions.json
          # Root redirect to latest
          echo '<meta http-equiv="refresh" content="0;url=latest/">' > deploy-root/index.html
          touch deploy-root/.nojekyll

      - name: Deploy root files
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: deploy-root
          clean: false

      - name: Deploy versioned site
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ${{ inputs.site_dir }}/public
          target-folder: ${{ steps.ver.outputs.tag }}
