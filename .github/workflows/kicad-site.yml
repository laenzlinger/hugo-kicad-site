name: KiCad Site Build & Deploy

on:
  workflow_call:
    inputs:
      project_name:
        description: "Project name (e.g. my-project)"
        required: true
        type: string
      schematic:
        description: "KiCad schematic filename"
        required: true
        type: string
      pcb:
        description: "KiCad PCB filename (optional)"
        type: string
        default: ""
      kicad_dir:
        description: "Directory containing KiCad project files"
        type: string
        default: "."
      kibot_config:
        description: "KiBot config filename (relative to kicad_dir)"
        type: string
        default: ""
      container_image:
        description: "KiCad container image"
        type: string
        default: "ghcr.io/inti-cmnb/kicad10_auto_full:dev"
      kibot_install:
        description: "Custom KiBot install command (e.g. pip install from dev branch). Leave empty if container already has KiBot."
        type: string
        default: ""
      site_dir:
        description: "Directory containing Hugo site"
        type: string
        default: "site"
      site_base_url:
        description: "Base URL of the GitHub Pages site (e.g. https://my-org.github.io/my-project)"
        required: true
        type: string
      remove_step_file:
        description: "Remove large STEP file from output"
        type: boolean
        default: true
      assembly_dir:
        description: "Directory containing assembly 3D model files (STEP/GLB). Leave empty to skip."
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.container_image }}
      options: --user root
    env:
      # Shared paths
      GEN_DIR: ${{ inputs.kicad_dir }}/generated
      SITE_DIR: ${{ inputs.site_dir }}
      # KiBot 3D model cache
      KIBOT_3D_MODELS: /github/home/cache_3d
      KICAD9_3DMODEL_DIR: /usr/share/kicad/3dmodels
      KICAD10_3DMODEL_DIR: /usr/share/kicad/3dmodels
    steps:

      # ── Setup ──────────────────────────────────────────────

      - uses: actions/checkout@v5
        with:
          fetch-depth: "0"

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq python3-pip python3-lxml git rsync wget jq kicad-packages3d > /dev/null 2>&1
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          KIBOT_INSTALL="${{ inputs.kibot_install }}"
          if [ -n "$KIBOT_INSTALL" ]; then
            eval "$KIBOT_INSTALL"
          fi

      - name: Cache 3D models
        uses: set-soft/cache@main
        with:
          path: ~/cache_3d
          key: cache_3d

      - name: Determine version
        id: ver
        run: |
          case "$GITHUB_REF" in
            refs/tags/*) echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT" ;;
            *) echo "tag=latest" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build KiBot args
        id: kibot
        run: |
          ARGS="-e ${{ inputs.schematic }} -d generated"
          [ -n "${{ inputs.pcb }}" ] && ARGS="-b ${{ inputs.pcb }} $ARGS"
          [ -n "${{ inputs.kibot_config }}" ] && ARGS="-c ${{ inputs.kibot_config }} $ARGS"
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      # ── KiBot ──────────────────────────────────────────────

      - name: Run KiBot
        working-directory: ${{ inputs.kicad_dir }}
        run: kibot ${{ steps.kibot.outputs.args }}

      - name: Remove STEP file
        if: inputs.remove_step_file
        run: rm -f "${{ env.GEN_DIR }}/3D/${{ inputs.project_name }}-3D.step"

      - name: Run KiBot diffs
        working-directory: ${{ inputs.kicad_dir }}
        continue-on-error: true
        run: |
          for target in diff_sch diff_pcb basic_diff_sch basic_diff_pcb; do
            kibot ${{ steps.kibot.outputs.args }} -s run_erc,run_drc "$target" || true
          done

      # ── Assembly models ────────────────────────────────────

      - name: Copy assembly models
        if: inputs.assembly_dir != ''
        run: |
          [ -d "${{ inputs.assembly_dir }}" ] || exit 0
          mkdir -p "${{ env.SITE_DIR }}/static/assembly"
          find "${{ inputs.assembly_dir }}" -maxdepth 1 \
            \( -name 'assembly-*.step' -o -name 'assembly-*.glb' -o -name 'assembly-*.3mf' -o -name 'assembly-*.png' \) \
            -exec cp {} "${{ env.SITE_DIR }}/static/assembly/" \;

      - name: Generate assembly thumbnails
        if: inputs.assembly_dir != ''
        run: |
          ASSEMBLY="${{ env.SITE_DIR }}/static/assembly"
          [ -d "$ASSEMBLY" ] || exit 0

          # Check if any model is missing a thumbnail
          NEED_SCREENSHOT=false
          for model in "$ASSEMBLY"/assembly-*.step "$ASSEMBLY"/assembly-*.glb; do
            [ -f "$model" ] || continue
            [ -f "${model%.*}.png" ] || { NEED_SCREENSHOT=true; break; }
          done
          [ "$NEED_SCREENSHOT" = true ] || exit 0

          # Install Playwright with cached browsers
          pip install -q --break-system-packages playwright > /dev/null 2>&1 || true
          if [ -d /github/home/cache_playwright ]; then
            cp -r /github/home/cache_playwright/* /root/.cache/ms-playwright/ 2>/dev/null || true
          fi
          playwright install --with-deps chromium > /dev/null 2>&1 || true
          mkdir -p /github/home/cache_playwright
          cp -r /root/.cache/ms-playwright/* /github/home/cache_playwright/ 2>/dev/null || true

          # Render missing thumbnails
          wget -q -O /tmp/screenshot.py https://raw.githubusercontent.com/laenzlinger/hugo-kicad-site/main/scripts/assembly-screenshot.py
          for model in "$ASSEMBLY"/assembly-*.step "$ASSEMBLY"/assembly-*.glb; do
            [ -f "$model" ] || continue
            thumb="${model%.*}.png"
            if [ ! -f "$thumb" ]; then
              echo "Rendering thumbnail for $(basename "$model")..."
              python3 /tmp/screenshot.py "$model" "$thumb" || true
            fi
          done

      - name: Cache Playwright browsers
        if: inputs.assembly_dir != ''
        uses: set-soft/cache@main
        with:
          path: /github/home/cache_playwright
          key: cache_playwright

      # ── Discover KiBot outputs ─────────────────────────────
      # NOTE: These steps are replaced by KiBot's kicad_site output
      # when the KiBot config includes a kicad_site output definition.
      # Kept as fallback for configs without kicad_site.

      - name: Check for KiBot-generated config
        id: kibot_site
        run: |
          if [ -f "${{ env.SITE_DIR }}/config_override.yaml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Discover renders
        if: steps.kibot_site.outputs.exists == 'false'
        id: renders
        run: |
          RENDERS="[]"
          if [ -d "${{ env.GEN_DIR }}/3D" ]; then
            BLENDER=$(find "${{ env.GEN_DIR }}/3D" -maxdepth 1 -name '*blender*.png' -printf '%f\n' | sort)
            if [ -n "$BLENDER" ]; then
              RENDERS=$(echo "$BLENDER" | jq -R . | jq -s .)
            else
              RENDERS=$(find "${{ env.GEN_DIR }}/3D" -maxdepth 1 -name '*.png' -printf '%f\n' | sort | jq -R . | jq -s .)
            fi
          fi
          echo "json=$(echo "$RENDERS" | jq -c .)" >> "$GITHUB_OUTPUT"

      - name: Discover downloads
        if: steps.kibot_site.outputs.exists == 'false'
        id: downloads
        run: |
          GEN="${{ env.GEN_DIR }}"
          DL="[]"
          add() {
            local m=$(find "$GEN" -name "$2" -type f $3 2>/dev/null | head -1)
            [ -n "$m" ] && DL=$(echo "$DL" | jq --arg n "$1" --arg p "${m#$GEN/}" '. + [{"name":$n,"path":$p}]') || true
          }
          add "Schematic (PDF)" "*schematic*.pdf"
          add "BOM (HTML)" "*bom*.html" "! -name *ibom*"
          add "BOM (CSV)" "*bom*.csv" "! -name *ibom*"
          add "Interactive BOM" "*ibom*.html"
          add "JLCPCB" "*JLCPCB*.zip"
          add "PCBWay" "*PCBWay*.zip"
          echo "json=$(echo "$DL" | jq -c .)" >> "$GITHUB_OUTPUT"

      - name: Discover diffs
        if: steps.kibot_site.outputs.exists == 'false'
        id: diffs
        run: |
          GEN="${{ env.GEN_DIR }}"
          DIFFS="[]"
          for f in $(find "$GEN/Diff" "$GEN/diff" \( -name '*.html' -o -name '*.pdf' \) -type f 2>/dev/null | grep -v '(' | sort -u); do
            NAME=$(basename "$f" .html | sed 's/-/ /g; s/\b\(.\)/\u\1/g')
            DIFFS=$(echo "$DIFFS" | jq --arg n "$NAME" --arg p "${f#$GEN/}" '. + [{"name":$n,"path":$p}]')
          done
          echo "json=$(echo "$DIFFS" | jq -c .)" >> "$GITHUB_OUTPUT"

      - name: Discover interactive BOM
        if: steps.kibot_site.outputs.exists == 'false'
        id: ibom
        run: |
          IBOM=$(find "${{ env.GEN_DIR }}" -name '*ibom*.html' -type f 2>/dev/null | head -1)
          echo "path=${IBOM:+${IBOM#${{ env.GEN_DIR }}/}}" >> "$GITHUB_OUTPUT"

      # ── Hugo site build ────────────────────────────────────

      - name: Install Hugo and Go
        uses: jdx/mise-action@v4
        with:
          working_directory: ${{ inputs.site_dir }}

      - name: Copy assets to Hugo static dir
        if: steps.kibot_site.outputs.exists == 'false'
        run: |
          rsync -a "${{ env.GEN_DIR }}/" "${{ env.SITE_DIR }}/static/"
          rm -f "${{ env.SITE_DIR }}/static/index.html"

          # Copy KiCad source files for KiCanvas viewer
          mkdir -p "${{ env.SITE_DIR }}/static/kicad"
          cp ${{ inputs.kicad_dir }}/*.kicad_sch ${{ inputs.kicad_dir }}/*.kicad_pcb "${{ env.SITE_DIR }}/static/kicad/" 2>/dev/null || true

      - name: Build Hugo config override
        if: steps.kibot_site.outputs.exists == 'false'
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="$TAG"
          [ "$TAG" = "latest" ] && VERSION="main"

          # Order KiCad files: root schematic first, then others, then PCB
          KICAD_FILES=$(cd "${{ env.SITE_DIR }}/static/kicad" && {
            [ -f "${{ inputs.schematic }}" ] && echo "${{ inputs.schematic }}"
            ls *.kicad_sch 2>/dev/null | grep -v "^${{ inputs.schematic }}$" || true
            ls *.kicad_pcb 2>/dev/null || true
          } | jq -R . | jq -s -c .)

          # Auto-discover assembly models unless manually configured
          ASSEMBLY_MODELS="[]"
          if [ -d "${{ env.SITE_DIR }}/static/assembly" ]; then
            if ! grep -q 'assemblyModels:' "${{ env.SITE_DIR }}/hugo.yaml" 2>/dev/null; then
              ASSEMBLY_MODELS=$(cd "${{ env.SITE_DIR }}/static/assembly" && \
                ls *.step *.glb *.3mf 2>/dev/null | \
                jq -R '{name: (. | sub("assembly-";"") | sub("\\.(step|glb|3mf)$";"") | gsub("[-_]";" ")), file: .}' | \
                jq -s -c .)
            fi
          fi

          # Clear downloads for non-release builds
          DOWNLOADS='${{ steps.downloads.outputs.json }}'
          [ "$TAG" = "latest" ] && DOWNLOADS='[]'

          # Write config override
          {
            echo "baseURL: \"${{ inputs.site_base_url }}/${TAG}/\""
            echo "params:"
            echo "  version: \"${VERSION}\""
            echo "  kicadFiles: ${KICAD_FILES}"
            echo "  renders: ${{ steps.renders.outputs.json }}"
            echo "  downloads: ${DOWNLOADS}"
            echo "  diffs: ${{ steps.diffs.outputs.json }}"
          } > "${{ env.SITE_DIR }}/config_override.yaml"

          # Append optional params
          IBOM="${{ steps.ibom.outputs.path }}"
          [ -n "$IBOM" ] && echo "  ibom: \"${IBOM}\"" >> "${{ env.SITE_DIR }}/config_override.yaml" || true
          [ "$ASSEMBLY_MODELS" != "[]" ] && echo "  assemblyModels: ${ASSEMBLY_MODELS}" >> "${{ env.SITE_DIR }}/config_override.yaml" || true

      - name: Build Hugo site
        working-directory: ${{ inputs.site_dir }}
        run: |
          hugo mod get
          hugo --minify --config hugo.yaml,config_override.yaml

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: site-${{ steps.ver.outputs.tag }}
          path: ${{ inputs.site_dir }}/public

      # ── Deploy to GitHub Pages ─────────────────────────────

      - name: Update versions.json
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch origin gh-pages:gh-pages 2>/dev/null || true

          # Get existing versions.json, remove current tag if present
          EXISTING="[]"
          git show gh-pages:versions.json > /tmp/old-versions.json 2>/dev/null && \
            EXISTING=$(jq 'map(select(.tag != "'"$TAG"'"))' /tmp/old-versions.json)

          # Prepend new entry, mark first as latest
          echo "$EXISTING" | jq --arg tag "$TAG" \
            '[{tag:$tag}] + [.[] | del(.latest)] | .[0].latest = true' > /tmp/versions.json

          mkdir -p deploy-root
          cp /tmp/versions.json deploy-root/versions.json
          echo '<meta http-equiv="refresh" content="0;url=latest/">' > deploy-root/index.html
          touch deploy-root/.nojekyll

      - name: Deploy root files
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: deploy-root
          clean: false

      - name: Deploy versioned site
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ${{ inputs.site_dir }}/public
          target-folder: ${{ steps.ver.outputs.tag }}
