kibot:
  version: 1

import:
  - file: PCB2Blender_2_1

outputs:
  - name: blender_export
    type: blender_export
    dir: 3D
    options:
      pcb3d: _PCB2Blender_2_1
      add_default_light: false
      light:
        - name: sun
          type: SUN
          energy: 3
        - name: fill
          type: POINT
          pos_x: 'size*3'
          pos_y: '-size*3'
          pos_z: 'size*4'
          energy: 0
      render_options:
        samples: 20
        transparent_background: true
        auto_crop: true
      outputs:
        - type: render
      point_of_view:
        - rotate_x: 30
          rotate_z: -20
          file_id: _blender_1_top
        - rotate_x: 210
          rotate_z: -20
          file_id: _blender_2_bottom

  - name: schematic
    type: pdf_sch_print
    dir: Schematic
    options:
      output: "%f-schematic.pdf"

  - name: bom
    type: bom
    dir: BoM
    options:
      format: HTML
      output: "%f-bom.html"

  - name: ibom
    type: ibom
    dir: BoM
    options:
      output: "%f-ibom.html"

  - name: step
    type: step
    dir: Assembly
    options:
      download: true
      output: "assembly-pcb.step"

  - name: glb
    type: export_3d
    dir: Assembly
    options:
      format: glb
      output: "assembly-pcb.glb"

  - name: navigate
    type: navigate_results
    dir: Browse

  - name: diff_sch
    type: diff
    dir: Diff
    run_by_default: false
    options:
      old: KIBOT_TAG-0
      old_type: git
      pcb: false

  - name: diff_pcb
    type: diff
    dir: Diff
    run_by_default: false
    options:
      old: KIBOT_TAG-0
      old_type: git
      only_pcb: true
