kibot:
  version: 1

import:
  - file: PCB2Blender_2_1

outputs:
  - name: site
    comment: Hugo KiCad Site
    type: kicad_site
    dir: ../exampleSite
    options:
      base_url: https://laenzlinger.github.io/hugo-kicad-site/
      # NOTE: use 'renderers' until KiBot fixes the 'renders' attribute bug
      renderers: blender_export
      downloads:
        - name: "Schematic (PDF)"
          output: schematic
        - name: "BOM (HTML)"
          output: bom
        - name: "Interactive BOM"
          output: ibom
      diffs:
        - name: "Diff Schematic"
          output: diff_sch
        - name: "Diff PCB"
          output: diff_pcb
      assembly_models:
        - name: "PCB Assembly"
          output: step

  - name: blender_export
    type: blender_export
    dir: 3D
    options:
      pcb3d: _PCB2Blender_2_1
      add_default_light: false
      light:
        - name: sun
          type: SUN
          energy: 3
        - name: fill
          type: POINT
          pos_x: 'size*3'
          pos_y: '-size*3'
          pos_z: 'size*4'
          energy: 0
      render_options:
        samples: 20
        transparent_background: true
        auto_crop: true
      outputs:
        - type: render
      point_of_view:
        - rotate_x: 30
          rotate_z: -20
          file_id: _blender_1_top
        - rotate_x: 210
          rotate_z: -20
          file_id: _blender_2_bottom

  - name: schematic
    type: pdf_sch_print
    dir: Schematic
    options:
      output: "%f-schematic.pdf"

  - name: bom
    type: bom
    dir: BoM
    options:
      format: HTML
      output: "%f-bom.html"

  - name: ibom
    type: ibom
    dir: BoM
    options:
      output: "%f-ibom.html"

  - name: step
    type: step
    dir: Assembly
    options:
      download: true
      output: "assembly-pcb.step"

  - name: navigate
    type: navigate_results
    dir: Browse

  - name: diff_sch
    type: diff
    dir: Diff
    run_by_default: false
    options:
      old: KIBOT_TAG-0
      old_type: git
      pcb: false

  - name: diff_pcb
    type: diff
    dir: Diff
    run_by_default: false
    options:
      old: KIBOT_TAG-0
      old_type: git
      only_pcb: true
