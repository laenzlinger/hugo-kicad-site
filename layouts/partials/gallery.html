{{ with .Site.Params.renders }}
{{ $renderDir := default "3D" $.Site.Params.renderDir }}
<div class="gallery-grid">
  {{ range . }}
  <figure>
    <img src="{{ $.Site.BaseURL }}{{ $renderDir }}/{{ . }}" alt="{{ . | replaceRE `[-_]` " " | replaceRE `\.png$` "" }}" loading="lazy">
    <figcaption>{{ . | replaceRE `[-_]` " " | replaceRE `\.png$` "" }}</figcaption>
  </figure>
  {{ end }}
</div>
{{ end }}
