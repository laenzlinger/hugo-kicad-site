{{/* Version picker reads /versions.json at runtime and switches between /<version>/current-page */}}
<select id="version-select" class="version-select" aria-label="Select version"></select>
<script>
(function() {
  var sel = document.getElementById('version-select');
  var baseURL = {{ .Site.BaseURL }};
  // Strip trailing slash and version segment to get site root
  var root = baseURL.replace(/\/[^/]*\/?$/, '');

  fetch(root + '/versions.json')
    .then(function(r) { return r.json(); })
    .then(function(versions) {
      // Current path relative to version root
      var path = window.location.pathname.replace(baseURL.replace(/^https?:\/\/[^/]+/, ''), '');
      sel.innerHTML = versions.map(function(v) {
        var tag = (typeof v === 'string') ? v : v.tag;
        var label = tag;
        if (typeof v === 'object' && v.latest) label += ' (latest)';
        var selected = baseURL.indexOf('/' + tag + '/') !== -1 ? ' selected' : '';
        return '<option value="' + tag + '"' + selected + '>' + label + '</option>';
      }).join('');
      sel.addEventListener('change', function() {
        window.location.href = root + '/' + sel.value + '/' + path;
      });
    })
    .catch(function() { sel.style.display = 'none'; });
})();
</script>
