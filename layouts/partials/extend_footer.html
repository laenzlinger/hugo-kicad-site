{{ partial "version-picker.html" . }}
<style>
footer.footer > span:last-of-type { display: none; }
footer.footer > span:first-of-type::after { content: none; }
.footer-badges { width: 100%; text-align: center; padding-top: 0.5rem; }
</style>
<div class="footer-badges">
{{ with .Site.Params.oshwaID }}<a href="https://certification.oshwa.org/{{ . | lower }}.html"><img src="https://img.shields.io/badge/OSHWA-{{ . }}-blue" alt="OSHWA {{ . }}"></a> {{ end }}{{ with .Site.Params.license }}<img src="https://img.shields.io/badge/License-{{ . | replaceRE `[-.]` "--" }}-green" alt="License: {{ . }}">{{ end }}
</div>
