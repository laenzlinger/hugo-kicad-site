{{ partial "version-picker.html" . }}
<script>
document.addEventListener('DOMContentLoaded', function() {
  var footer = document.querySelector('footer.footer');
  if (!footer) return;
  var powered = footer.querySelector('span:last-of-type');
  if (powered && powered.textContent.indexOf('Powered') !== -1) {
    var div = document.createElement('div');
    div.style.cssText = 'text-align:center;margin-top:0.5rem;';
    div.innerHTML = '{{ with .Site.Params.oshwaID }}<a href="https://certification.oshwa.org/{{ . | lower }}.html"><img src="https://img.shields.io/badge/OSHWA-{{ . }}-blue" alt="OSHWA {{ . }}" style="vertical-align:middle"></a> {{ end }}{{ with .Site.Params.license }}<img src="https://img.shields.io/badge/License-{{ . | replaceRE `[-.]` "--" }}-green" alt="License: {{ . }}" style="vertical-align:middle">{{ end }}';
    powered.replaceWith(div);
  }
});
</script>
