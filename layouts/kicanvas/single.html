{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ with .Site.Params.repoURL }}
  {{ $ref := site.Params.version | default "main" }}
  {{ $dir := site.Params.kicadDir | default "" }}
  <iframe id="kicanvas-frame" width="100%" height="600" frameborder="0" loading="lazy"></iframe>
  <script>
  document.getElementById('kicanvas-frame').src =
    'https://kicanvas.org/?github={{ . }}/tree/{{ $ref }}/{{ $dir }}';
  </script>
  {{ end }}
</article>
{{ end }}
