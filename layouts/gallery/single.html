{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title entry-hint-parent">{{ .Title }}</h1>
    <div class="post-meta"></div>
  </header>
  <div class="post-content">

  {{ .Content }}
  {{ $renders := .Site.Params.renders }}
  {{ with $renders }}
  <div class="gallery-grid">
    {{ range . }}
    <figure>
      <img src="{{ $.Site.BaseURL }}3D/{{ . }}" alt="{{ . | replaceRE `[-_]` " " | replaceRE `\.png$` "" }}" loading="lazy">
      <figcaption>{{ . | replaceRE `[-_]` " " | replaceRE `\.png$` "" }}</figcaption>
    </figure>
    {{ end }}
  </div>
  {{ else }}
  <p>No renders available for this version.</p>
  {{ end }}
  </div>
</article>
{{ end }}
